name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and bundle
        run: make bundle
      
      - name: Create zip artifact
        run: cd build && zip -r TerminalScreenSaver.saver.zip TerminalScreenSaver.saver/
      
      - name: Create DMG
        run: |
          mkdir -p dmg-temp
          cp -r build/TerminalScreenSaver.saver dmg-temp/
          hdiutil create -volname "Terminal Screen Saver" \
            -srcfolder dmg-temp \
            -ov -format UDZO \
            build/TerminalScreenSaver.dmg
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/TerminalScreenSaver.saver.zip
            build/TerminalScreenSaver.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
