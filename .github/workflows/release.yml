name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release (e.g. v1.0.6)
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Resolve tag
        id: rel
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - name: Build and bundle
        run: make bundle

      - name: Verify ad-hoc signature
        run: codesign -dv build/TerminalScreenSaver.saver

      - name: Create zip artifact
        run: cd build && zip -r TerminalScreenSaver.saver.zip TerminalScreenSaver.saver/

      - name: Create DMG
        run: |
          mkdir -p dmg-temp
          cp -r build/TerminalScreenSaver.saver dmg-temp/
          hdiutil create -volname "Terminal Screen Saver" \
            -srcfolder dmg-temp \
            -ov -format UDZO \
            build/TerminalScreenSaver.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            build/TerminalScreenSaver.saver.zip
            build/TerminalScreenSaver.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes an updated Homebrew cask to the tap repo on every release.
  # Requires a repo secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with
  # Contents: read/write on <owner>/homebrew-tap. If the secret is absent,
  # this job skips cleanly (setup steps in packaging/homebrew/README.md).
  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set — skipping tap update."
          fi

      - name: Resolve tag
        if: steps.gate.outputs.ok == 'true'
        id: rel
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out this repo (cask template)
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - name: Check out Homebrew tap
        if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render cask with version + checksum
        if: steps.gate.outputs.ok == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/TerminalScreenSaver.saver.zip"
          echo "Fetching $URL"
          for i in $(seq 1 12); do
            code=$(curl -sL -o app.zip -w '%{http_code}' "$URL" || true)
            if [ "$code" = "200" ] && [ -s app.zip ]; then break; fi
            echo "attempt $i: HTTP $code — retrying in 6s"; sleep 6
          done
          SHA=$(shasum -a 256 app.zip | awk '{print $1}')
          echo "version=$VERSION sha256=$SHA"
          mkdir -p tap/Casks
          sed -E \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "s#^  sha256 \".*\"#  sha256 \"${SHA}\"#" \
            packaging/homebrew/terminal-screensaver.rb > tap/Casks/terminal-screensaver.rb

      - name: Commit & push to tap
        if: steps.gate.outputs.ok == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/terminal-screensaver.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
          else
            git commit -m "terminal-screensaver ${TAG#v}"
            git push
          fi
