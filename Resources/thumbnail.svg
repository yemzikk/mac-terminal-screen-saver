<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" font-family="Menlo, 'DejaVu Sans Mono', monospace">
  <defs>
    <radialGradient id="bg" cx="42%" cy="16%" r="95%">
      <stop offset="0%" stop-color="#0f2413"/>
      <stop offset="60%" stop-color="#081109"/>
      <stop offset="100%" stop-color="#040905"/>
    </radialGradient>
    <linearGradient id="tb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12200f"/>
      <stop offset="100%" stop-color="#0b140c"/>
    </linearGradient>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect y="1.6" width="3" height="0.8" fill="#000000" opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="320" height="200" fill="url(#bg)"/>

  <!-- back (cascaded) window -->
  <g opacity="0.5">
    <rect x="70" y="16" width="228" height="120" rx="9" fill="#0a170d" stroke="#1c8f4e" stroke-opacity="0.5"/>
    <path d="M70 27 a9 9 0 0 1 9 -9 h210 a9 9 0 0 1 9 9 v9 h-228 z" fill="url(#tb)"/>
    <circle cx="82" cy="27" r="3" fill="#ff5f57"/>
    <circle cx="93" cy="27" r="3" fill="#febc2e"/>
    <circle cx="104" cy="27" r="3" fill="#28c840"/>
    <text x="82" y="60" fill="#1c8f4e" font-size="11">$ docker build -t api .</text>
    <text x="82" y="80" fill="#146b3a" font-size="11">Successfully built</text>
  </g>

  <!-- front window -->
  <g>
    <rect x="22" y="58" width="236" height="124" rx="9" fill="#0b120b" stroke="#1c8f4e" stroke-opacity="0.7"/>
    <path d="M22 69 a9 9 0 0 1 9 -9 h218 a9 9 0 0 1 9 9 v9 h-236 z" fill="url(#tb)"/>
    <circle cx="34" cy="69" r="3.5" fill="#ff5f57"/>
    <circle cx="46" cy="69" r="3.5" fill="#febc2e"/>
    <circle cx="58" cy="69" r="3.5" fill="#28c840"/>
    <g font-size="12" xml:space="preserve">
      <text x="36" y="104"><tspan fill="#58ffa0">dev@mac:~/app$</tspan><tspan fill="#ffffff"> git status</tspan></text>
      <text x="36" y="126" fill="#1c8f4e">On branch main</text>
      <text x="36" y="148" fill="#1c8f4e">working tree clean</text>
      <text x="36" y="170" fill="#58ffa0">dev@mac:~/app$</text>
      <rect x="140" y="159" width="7" height="13" fill="#2bff87"/>
    </g>
  </g>

  <rect width="320" height="200" fill="url(#scan)"/>
</svg>
